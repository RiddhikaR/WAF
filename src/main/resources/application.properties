# =====================
# WAF Configuration
# =====================

# Rate Limiting
waf.rate-limit.threshold=50
waf.rate-limit.window-seconds=60

# Ban Settings
waf.ban.max-violations=5
waf.ban.ban-duration-minutes=15
waf.ban.violation-window-minutes=5

# Engine Settings
waf.engine.verdict-ttl-minutes=5
waf.engine.replay-ttl-seconds=30
waf.engine.max-payload-length=10000

# =====================
# Redis Configuration
# =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =====================
# Logging
# =====================
logging.level.com.waf.waf=INFO

spring.security.user.name=admin
spring.security.user.password=admin123